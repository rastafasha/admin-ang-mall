<div class="row animated fadeIn fast">
    <div class="col-12">
        <app-search [query]="query" [modelo]="usuario" [colleccionName]="usuarios"
[colleccion]="'usuarios'" (searchEvent)="handleSearchEvent($event)" (resetEvent)="PageSize()"></app-search>
    </div>
</div>

<app-skeleton-loader *ngIf="cargando" [rows]="1" [columns]="2"></app-skeleton-loader>
<app-skeleton-loader *ngIf="cargando" [rows]="4" [columns]="7"></app-skeleton-loader>

<div class="row animated fadeIn fast" *ngIf="!cargando">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Total de Usuarios: ({{totalUsuarios}})</h4>
                <h6 class="card-subtitle">Usuarios registrados en la app</h6>
                <div class="table-responsive">
                    <table class="table table-borderless">
                        <thead>
                            <tr>
                                <th>Avatar</th>
                                <th>Correo</th>
                                <th>Nombre</th>
                                <th>Cambiar Role</th>
                                <th>desde</th>
                                <th>Auth</th>
                                <th class="text-nowrap">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let usuario of usuarios |  paginate: { itemsPerPage: count, currentPage: p } | orderBy:'createdAt, desc'">
                                <td class="text-center">
                                    <img [src]="usuario.img | imagenPipe: 'usuarios'" [routerLink]="['/dashboard/usuario/',usuario.uid]" class="img-thumbnail avatar cursor" alt="">
                                </td>
                                <td>{{usuario.email}}</td>
                                <td>{{usuario.first_name}}</td>
                                <td>
                                    <select class="form-control" [(ngModel)]="usuario.role" (change)="cambiarRole(usuario)">
                                    <option value="SUPERADMIN">Superadmin</option>
                                    <option value="ADMIN">Admin</option>
                                    <option value="USER">User</option>
                                    <option value="VENTAS">Ventas</option>
                                    <option value="TIENDA">Tienda</option>
                                    <option value="ALMACEN">Almacen</option>
                                    <option value="CHOFER">Chofer</option>
                                  </select>
                                </td>
                                <td>
                                    <span *ngIf="usuario.local" class="label label-success">{{usuario.local.nombre}}</span>
                                </td>
                                <td>
                                    <span *ngIf="usuario.google" class="label label-danger">Google</span>
                                    <span *ngIf="!usuario.google" class="label label-info">Email</span>
                                </td>
                                
                                <td class="text-nowrap text-center">
                                    <button class="btn btn-outline-success" data-toggle="tooltip"
                                        [routerLink]="['/dashboard/tienda-user/edit/', usuario.uid]" >
                                        <i class="fa fa-edit"></i>
                                    </button>
                                    &nbsp;
                                    <button (click)="eliminarUsuario(usuario)" class="btn btn-outline-danger"
                                        data-toggle="tooltip" data-original-title="Borrar">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
                <!-- <div *ngIf="query.length === 0">
                    <button (click)="cambiarPagina(-5)" class="btn btn-secondary">Anterior</button> &nbsp;
                    <button (click)="cambiarPagina(5)" class="btn btn-secondary">Siguente</button>
                </div> -->
                <pagination-controls (pageChange)="p = $event"></pagination-controls>

            </div>
        </div>
    </div>
</div>
