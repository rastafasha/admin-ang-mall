<div class="row">

    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">{{'Mi perfil'|translate}}</h4>
                <h6 class="card-subtitle">{{"Ajustes"|translate}}</h6>
                <form class="form p-t-20 form-horizontal form-material" [formGroup]="perfilForm"
                    (submit)="actualizarPerfil()">
                    <div class="row">
                        <div class="form-group col-xs-12 col-sm-6">
                            <label for="exampleInputuname">{{'Nombre'|translate}}</label>
                            <div class="input-group">
                                <input type="text" formControlName="first_name" class="form-control"
                                    id="exampleInputuname" placeholder="nombre">
                            </div>
                        </div>
                        <div class="form-group col-xs-12 col-sm-6">
                            <label for="exampleInputApellido">{{'Apellido'|translate}}</label>
                            <div class="input-group">
                                <input type="text" formControlName="last_name" class="form-control"
                                    id="exampleInputApellido" placeholder="apellido">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group col-xs-12 col-sm-6">
                        <label for="exampleInputID">{{'Identificación'|translate}}</label>
                        <div class="input-group">
                            <input type="text" formControlName="numdoc" class="form-control" id="exampleInputID" placeholder="Id">
                        </div>
                    </div>
                        <div class="form-group col-xs-12 col-sm-6">
                            <label for="exampleInputTelefono">{{'Teléfono'|translate}}</label>
                            <div class="input-group">
                                <input type="text" formControlName="telefono" class="form-control"
                                    id="exampleInputTelefono" placeholder="telefono">
                            </div>
                        </div>
                        
                    </div>
                    
                    <div class="form-group">
                        <label for="exampleInputEmail">Email</label>
                        <div class="input-group">
                            <input type="email" formControlName="email" [readOnly]="usuario.google" class="form-control" id="exampleInputEmail" placeholder="email">
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group col-xs-12 col-sm-6">
                            <label for="exampleInputPais">{{'Pais'|translate}}</label>
                            <div class="input-group">
                                <input type="text" formControlName="pais" class="form-control" id="exampleInputPais"
                                    placeholder="Pais">
                            </div>
                        </div>
                    <div class="form-group col-xs-12 col-sm-6">
                        <label for="exampleInputPais">{{'Idioma'|translate}}</label>
                        <select formControlName="lang" class="form-control">
                            <option value="">{{'Seleccione'|translate}}</option>
                            <option value="es">ES</option>
                            <option value="en">EN</option>
                        </select>
                    </div>
                    </div>

                    <button type="submit" [disabled]="perfilForm.invalid"
                        class="btn btn-success waves-effect waves-light m-r-10 btn-block">
                        <i class="fa fa-save"></i> {{'Guardar'|translate}} 
                    </button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">{{'Imagen'|translate}}</h4>
                <h6 class="card-subtitle">{{'Foto de Perfil'|translate}}</h6>
                <div class="text-center">
                    <img *ngIf="!imgTemp" [src]="usuario.img" class="img-avatar">
                    <img *ngIf="imgTemp" [src]="imgTemp" class="img-avatar">
                </div>
                <input type="file" (change)="cambiarImagen($event.target.files[0])">
                <br>
                <br>
                <button type="button" [disabled]="!imagenSubir" (click)="subirImagen()"
                    class="btn btn-success waves-effect waves-light m-r-10 btn-block">
                    <i class="fa fa-save"></i> {{'Subir'|translate}}
                </button>
                <div class="col-xs-12">
                    <h4>{{'Especificaciones'}}:</h4>
                    <ul>
                        <li>{{'Tamaño máximo'}}: 300px X 300px</li>
                        <li>{{'Peso máximo'}}: 3 mega bites</li>
                        <li>{{'Formato permitido'}}: jpg, .gif, .png</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
