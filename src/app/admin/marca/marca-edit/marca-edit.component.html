<div class="modal fade" id="editMarca" tabindex="-1" aria-labelledby="marcaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="marcaModalLabel">{{pageTitle}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                    (click)="onClose()"></button>
            </div>
            <div class="modal-body">
                <!-- <app-loading *ngIf="isLoading"></app-loading> -->
                <div class="container">
                    <div class="row">

                        <!-- Step Indicator -->
                        <div class="step-indicator m-t-20 m-b-20">
                            <div class="step" [ngClass]="{'active': currentStep >= 1, 'completed': currentStep > 1}">
                                <span class="step-number">1</span>
                                <span class="step-label">Datos</span>
                            </div>
                            <div class="step-line"></div>
                            <div class="step" [ngClass]="{'active': currentStep >= 2}">
                                <span class="step-number">2</span>
                                <span class="step-label">Imagen</span>
                            </div>
                        </div>
                        <!-- editar/crear post -->
                        <div *ngIf="currentStep === 1">
                            <form class="form p-t-20 form-horizontal form-material" [formGroup]="marcaForm">
                                <div class="form-group col-12">
                                    <label for="exampleInputuname">Nombre</label>
                                    <div class="input-group">

                                        <input type="text" formControlName="nombre" class="form-control"
                                            id="exampleInputuname" placeholder="nombre">
                                    </div>
                                </div>
                                <div class="form-group col-12">
                                    <label for="exampleInputApellido">Descripción</label>
                                    <div class="col-12">
                                        <ckeditor [editor]="Editor" formControlName="descripcion"
                                            data="<p>Hello, world!</p>" required></ckeditor>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <button class="btn btn-success waves-effect waves-light m-r-10 btn-block"
                                            type="button" (click)="nextStep()">Siguiente</button>
                                    </div>
                                    <div class="col-6">
                                        <button (click)="updateMarca()" class="btn btn-outline-success">
                                            {{ marcaSeleccionada ? 'Actualizar y Continuar' : 'Crear y Continuar' }}
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <div *ngIf="currentStep === 2">
                            <app-loading *ngIf="isLoadingImage"></app-loading>
                            <div *ngIf="!isLoadingImage">
                                <label> Anexe su foto</label>
                                <br>
                                <div class="row">
                                    <div class="especificaciones col-xs-12" *ngIf="!marcaSeleccionada">
                                        <h4>Debe Crear un post para agregar la imagen</h4>
                                    </div>
                                    <div class="especificaciones col-xs-12 col-sm-6" *ngIf="marcaSeleccionada">
                                        <h4>Especificaciones:</h4>
                                        <ul>
                                            <li>Tamaño máximo: 300px X 300px</li>
                                            <li>Peso máximo: 2 mb</li>
                                            <li>Formato permitido: jpg, .gif, .png</li>
                                        </ul>
                                    </div>
                                    <div class="col-xs-12 col-sm-6" *ngIf="marcaSeleccionada ">
                                        <div class="text-center">
                                            <img *ngIf="!imgTemp " [src]="marcaSeleccionada.img | imagenPipe: 'marcas'"
                                                class="img-responsive img-thumbnail" alt="">
                                            <img *ngIf="imgTemp" [src]="imgTemp" class="img-responsive">
                                            <div class="form-group ">

                                            </div>
                                        </div>
                                        <input type="file" (change)="cambiarImagen($event.target.files[0])">
                                        <br>
                                        <br>


                                        <div class="row">
                                            <div class="col-6">
                                                <button
                                                    class="btn btn-success waves-effect waves-light m-r-10 btn-block"
                                                    type="button" (click)="prevStep()">Anterior</button>
                                            </div>
                                            <div class="col-6">
                                                <button type="button" [disabled]="!imagenSubir" (click)="subirImagen()"
                                                    class="btn btn-success waves-effect waves-light m-r-10 btn-block">
                                                    <i class="fa fa-save"></i> Subir imagen
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>



                    </div>

                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    (click)="onClose()">Cerrar</button>
            </div>
        </div>
    </div>
</div>
