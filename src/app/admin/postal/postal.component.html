<app-back-instrucc (onOpenHelp)="instruccionesModal.open()"></app-back-instrucc>
<!-- Content-->
<section >
    <div class="row">
            <div class="col-xs-12 form-group">
                <div class="card">
                    <div class="col-lg-11" *ngIf="msm_error">
                        <div class="alert alert-primary alert-danger fade show" role="alert">
                            <span class="font-weight-medium">Mensaje:</span> {{msm_error}}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close"
                                (click)="close_alert()">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    </div>

                    <div class="col-3">
                        <button (click)="openEditModal()" class="btn btn-outline-success" data-toggle="tooltip"
                            data-original-title="Edit" data-bs-toggle="modal" data-bs-target="#editPostal">
                            <i class="fa fa-plus"></i>
                        </button>
                    </div>
                    <div class="col-lg-12 card p-3">
                        <div class="table-responsive table-sm">
                            <table class="table table-sm">
                                <thead class="thead-dark">
                                    <tr>
                                        <th>{{'Título'|translate}}</th>
                                        <th>{{'Tiempo'|translate}}</th>
                                        <th>{{'Precio'|translate}}</th>
                                        <th>{{'Distancia'|translate}}</th>
                                        <th>OP</th>
                                    </tr>
                                </thead>
                                <tbody *ngFor="let item of postales">
                                    <tr>
                                        <td style="font-size: 13px;">{{item.titulo}}</td>
                                        <td style="font-size: 13px;">{{item.tiempo}}</td>
                                        <td style="font-size: 13px;">{{item.precio}}</td>
                                        <td style="font-size: 13px;">{{item.distancia}}</td>
                                        <td class="text-center">
                                            <button class="btn btn-outline-success" data-toggle="tooltip"
                                                data-original-title="Edit" (click)="onEditProject(item)"
                                                data-bs-toggle="modal" data-bs-target="#editPostal">
                                                <i class="fa fa-edit"></i>
                                            </button>
                                            <button (click)="eliminar(item._id)" class="btn btn-outline-danger"
                                                data-toggle="tooltip" data-original-title="Borrar">
                                                <i class="fa fa-trash"></i>
                                            </button>

                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </div>
</section>
<app-crear-postal (refreshPostalList)="ngOnInit()" [postalSeleccionado]="postalSeleccionado" (closeModal)="onClose()"
    #editPostal></app-crear-postal>

<app-modal-instrucciones [info]="info" [sectionId]="'envio'" #instruccionesModal></app-modal-instrucciones>
