<!-- Content-->
<section class="pt-lg-4 pb-4 mb-3">
    <div class="pt-2 px-4 pl-lg-0 pr-xl-5">

        <div class="container">
            <div class="col-xs-12 form-group">
                <div class="card">
                    <div class="col-lg-11" *ngIf="msm_error">
                        <div class="alert alert-primary alert-danger fade show" role="alert">
                            <span class="font-weight-medium">Mensaje:</span> {{msm_error}}
                            <button type="button" class="close" data-dismiss="alert" aria-label="Close"
                                (click)="close_alert()">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                    </div>
                    <div class="col-1">
                        <div class="text-right">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <button class="btn btn-outline-primary btn-sm rounded-circle shadow-sm"
                                    (click)="instruccionesModal.open()" title="Ayuda de la sección">
                                    <i class="fa fa-question"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="col-3" *ngIf="!crearNuevo">
                        <button class="btn btn-primary" (click)="optionCrear()">
                            <i class="fa fa-pencil"></i>
                            Crear
                        </button>
                    </div>
                    <div class="col-lg-12 card p-3" *ngIf="!crearNuevo">
                        <div class="table-responsive table-sm">
                            <table class="table table-sm">
                                <thead class="thead-dark">
                                    <tr>

                                        <th>Empresa</th>
                                        <th>Tiempo</th>
                                        <th>Precio</th>
                                        <th>OP</th>
                                    </tr>
                                </thead>
                                <tbody *ngFor="let item of postales">
                                    <tr>
                                        <td style="font-size: 13px;">{{item.titulo}}</td>
                                        <td style="font-size: 13px;">{{item.tiempo}}</td>
                                        <td style="font-size: 13px;">{{item.precio}}</td>
                                        <td class="text-center">
                                           <button (click)="eliminar(item._id)"
                                                                class="btn btn-outline-danger" data-toggle="tooltip"
                                                                data-original-title="Borrar">
                                                                <i class="fa fa-trash"></i>
                                                            </button>
                                           
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-xs-12 form-group" *ngIf="crearNuevo">
                <button class="btn btn-outline-danger" (click)="cerrarOptionCrear()">
                    <i class="fa fa-close"></i>
                    Cerrar
                </button>
                <form #postalForm="ngForm" class="form-horizontal form-material" (ngSubmit)="onSubmit(postalForm)">
                    <div class="card">
                        <div class="card-header">
                            <b>Nuevo medio</b>
                        </div>
                        <div class="card-body">

                            <div class="container">
                                <div class="row">

                                    <div class="col-xs-12 col-sm-6 form-group">
                                        <label for="normal-input">Empresa o Tipo de envio</label>
                                        <input class="form-control" type="text" name="titulo"
                                            [(ngModel)]="postal.titulo" required placeholder="Empresa o tipo de envío">
                                    </div>
                                    <div class="col-xs-12 col-sm-6 form-group">
                                        <label for="normal-input">Tiempo estimado</label>
                                        <input class="form-control" type="text" name="tiempo"
                                            [(ngModel)]="postal.tiempo" required placeholder="10 - 15 días">
                                    </div>
                                    <div class="col-xs-12  col-sm-6 form-group">
                                        <label for="normal-input">Precio</label>
                                        <input class="form-control" type="number" name="precio"
                                            [(ngModel)]="postal.precio" required placeholder="Precio del envio">
                                    </div>
                                    <div class="col-xs-12 col-sm-6 form-group">
                                        <label for="normal-input">Días</label>
                                        <input class="form-control" type="number" name="dias" [(ngModel)]="postal.dias"
                                            required placeholder="En cuantos días llega aprox.">
                                    </div>
                                </div>

                            </div>
                        </div>
                        <div class="card-footer">
                            <button type="submit" class="btn btn-primary ">Crear</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
<app-modal-instrucciones [info]="info" [sectionId]="'Envío' |translate" #instruccionesModal></app-modal-instrucciones>
