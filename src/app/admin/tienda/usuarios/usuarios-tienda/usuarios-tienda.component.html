<div class="row animated fadeIn fast">
    <div class="col-12">
        <app-search [query]="query" [modelo]="usuario" [colleccionName]="usuarios"
[colleccion]="'usuarios'" (searchEvent)="handleSearchEvent($event)" (resetEvent)="PageSize()"></app-search>
       
    </div>
</div>

<div class="row animated fadeIn fast" *ngIf="cargando">
    <div class="col-12">
        <div class="alert alert-info text-center">
            <div class="alert-heading">Cargando</div>
            <i class="fa fa-spin fa-refresh fa-2x"></i>
            <p class="mb-0">Por favor espere</p>
        </div>
    </div>
</div>

<div class="row animated fadeIn fast" *ngIf="!cargando ">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="row">
                    <div class="col-11">
                        <h4 class="card-title">Total de Usuarios de Tienda</h4>
                        <h6 class="card-subtitle">Empleados registrados en la app</h6>
                    </div>
                    <div class="col-1">
                        <div class="text-right">
                            
                            <button [routerLink]="['/dashboard/tienda-user/registro']"class="btn btn-outline-success" data-toggle="tooltip"
                                data-original-title="Edit" >
                                <i class="fa fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Avatar</th>
                                <th>Correo</th>
                                <th>Nombre</th>
                                <th>Cambiar Role</th>
                                <th>Auth</th>
                                <th class="text-nowrap">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let usuario of usuarios |  paginate: { itemsPerPage: count, currentPage: p }">
                                <td class="text-center">
                                    <!-- <img src="{{usuario.imagenUrl}}" (click)="abrirModal(usuario)" class="img-thumbnail avatar cursor" alt=""> -->
                                    <img src="{{usuario.imagenUrl}}" [routerLink]="['/dashboard/tienda-user/edit/',usuario.uid]" class="img-thumbnail avatar cursor" alt="">
                                </td>
                                <td>{{usuario.email}}</td>
                                <td>{{usuario.first_name}}</td>
                                <td>
                                    <select class="form-control" [(ngModel)]="usuario.role" (change)="cambiarStatus(usuario)">
                                    
                                    <option value="USER">User</option>
                                    <option value="ADMIN">Admin</option>
                                    <option value="VENTAS">Ventas</option> 
                                    <option value="TIENDA">Tienda</option>
                                    <option value="ALMACEN">Almacen</option>
                                    <option value="CHOFER">Chofer</option>
                                  </select>
                                </td>
                                <td>
                                    <span *ngIf="usuario.google" class="label label-danger">Google</span>
                                    <span *ngIf="!usuario.google" class="label label-info">Email</span>
                                </td>
                                <td class="text-nowrap text-center">
                                    

                                    <button class="btn btn-outline-success" data-toggle="tooltip"
                                        data-original-title="Edit"[routerLink]="['/dashboard/tienda-user/edit/', usuario.uid]" >
                                        <i class="fa fa-edit"></i>
                                    </button>
                                    &nbsp;
                                    <button (click)="eliminarUsuario(usuario)" class="btn btn-outline-danger"
                                        data-toggle="tooltip" data-original-title="Borrar">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
                <div *ngIf="query.length === 0">
                    <pagination-controls (pageChange)="p = $event"></pagination-controls>
                </div>

            </div>
        </div>
    </div>
</div>
<app-modalinfo-usuarios-tienda></app-modalinfo-usuarios-tienda>
