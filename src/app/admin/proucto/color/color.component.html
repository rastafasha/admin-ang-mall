<div class="modal fade" id="editColor" tabindex="-1" aria-labelledby="coloModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="coloModalLabel">{{pageTitle}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                    (click)="onClose()"></button>
            </div>
            <div class="modal-body">
                <div class="container">
                    <div class="row">
                        <form #colorForm="ngForm" >
                            <div class="btn-group mr-2 mb-2" role="group" aria-label="Apply settings"
                                style="width: 100%;">
                                <input type="text" class="form-contorl" name="titulo" [(ngModel)]="titulo"
                                    style="padding-left: 10px;width: 100%" required autocomplete="off"
                                    placeholder="Titulo">
                                <input type="color" id="color-data" name="color" [(ngModel)]="color">
                                <button type="submit" class="btn btn-info" (click)="onSubmit(colorForm)">
                                    <i class="czi-add"></i>
                                </button>
                            </div>
                        </form>
                        <div class="col-lg-10" *ngIf="!color">
                            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                                <span class="font-weight-medium">Mensaje:</span> No hay ningun color en este producto.
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                        </div>
                        <div class="col-lg-10" *ngIf="msm_error">
                            <div class="alert alert-warning alert-dismissible fade show" role="alert">
                                <span class="font-weight-medium">Mensaje:</span> {{msm_error}}.
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                        </div>
                        <div class="col-lg-10" *ngIf="color ">
                            <div class="table-responsive">
                                <table class="table table-striped table-sm">
                                    <thead>
                                        <tr>
                                            <th class="text-center">Item</th>
                                            <th class="text-center">Preview</th>
                                            <th class="text-center">Eliminar</th>
                                        </tr>
                                    </thead>
                                    <tbody *ngFor="let item of color">
                                        <tr>
                                            <td class="text-center">{{item.titulo}}</td>
                                            <td [style.background]="item.color" [style.color]="item.color"
                                                class="text-center">color</td>
                                            <td class="text-center">
                                                <button class="btn btn-danger btn-sm"
                                                    (click)="eliminarColor(item._id)">Eliminar</button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    (click)="onClose()">Cerrar</button>
            </div>
        </div>
    </div>
</div>
