<div class="modal fade" id="editProdPapelera" tabindex="-1" aria-labelledby="coloModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="coloModalLabel">{{pageTitle}}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                    (click)="onClose()"></button>
            </div>
            <div class="modal-body">
                <div class="container">
                    <div class="row">
                        <form #searchForm="ngForm" (keyup)="search(searchForm)">
                            <div class="btn-group mr-2 mb-2" role="group" aria-label="Apply settings">
                                <button type="submit" class="btn btn-info">
                                    <i class="czi-search"></i>
                                </button>
                                <input type="text" class="form-contorl" name="filtro" [(ngModel)]="filtro"
                                    style="padding-left: 10px;">
                                <select class="form-control" name="search_categoria" [(ngModel)]="search_categoria"
                                    (change)="search_cat()">
                                    <option value="" selected disabled>Categoría</option>
                                    <option [value]="item._id" *ngFor="let item of listCategorias">{{item.nombre}}
                                    </option>
                                </select>

                            </div>
                        </form>
                        <div class="card-check">
                    <div class="row">
                        <div class="col-lg-12 mb-4" *ngIf="count_cat == 0">
                            <div class="alert alert-dark alert-with-icon mb-0" role="alert">
                                <div class="alert-icon-box"><i class="alert-icon czi-security-announcement"></i></div>No
                                hay ningún elemento en la papelera de reciclaje.
                            </div>
                        </div>
                        <div class="col-lg-12 mb-4"
                            *ngFor="let item of productos |  paginate: { itemsPerPage: count, currentPage: p }">
                            <div class="card">
                                <div class="row no-gutters">
                                    <div class="col-sm-4">
                                        <img [src]="item.img | imagenPipe: 'productos'"
                                            class="rounded-left img-responsive" alt="Card image">
                                    </div>
                                    <div class="col-sm-8">
                                        <div class="card-body">
                                            <h5 class="card-title">{{item.titulo}}</h5>
                                            <div class="h3 font-weight-normal text-accent mb-3 mr-1">
                                                ${{item.precio_ahora}}<small></small>
                                                <del class="font-size-sm text-muted" style="padding-left: 10px;"><small
                                                        style="font-size: 18px;">{{item.precio_antes}}</small></del>

                                                <div class="font-size-sm mb-4">
                                                    <span class="text-heading font-weight-medium mr-1">Estado:</span>
                                                    <span class="badge badge-dark badge-shadow"
                                                        *ngIf="item.status == 'Papelera'">{{item.status}}</span>

                                                </div>
                                            </div>
                                            <button type="button" class="btn btn-outline-primary"
                                                *ngIf="item.status == 'Papelera'" (click)="desactivar(item._id)"> 
                                                Mover a entradas
                                            </button>
                                            <br>
                                            <span class="text-muted" *ngIf="item.status == 'Papelera'"
                                                style="font-size: 13px;">Este producto aún no está disponible en la
                                                tienda.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <div class="col-lg-12">
                            <pagination-controls (pageChange)="p = $event"></pagination-controls>
                        </div>

                    </div>
                </div>
                    </div>

                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                    (click)="onClose()">{{'Cerrar'| translate}}</button>
            </div>
        </div>
    </div>
</div>
